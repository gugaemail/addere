services:
  # ── PRODUCTION ──────────────────────────────────────────────────────────────
  - type: web
    name: addere-api
    runtime: node
    region: oregon
    plan: starter
    # rootDir não definido — build roda da raiz do monorepo (necessário para npm workspaces)
    buildCommand: npm install --include=dev && npx prisma generate --schema=packages/db/prisma/schema.prisma && npm run build --workspace=@addere/api
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Preencher manualmente no painel Render (nunca commitar segredos)
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_DIRECT
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: PROTHEUS_ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://addere.vercel.app

  # ── STAGING ─────────────────────────────────────────────────────────────────
  - type: web
    name: addere-api-staging
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install --include=dev && npx prisma generate --schema=packages/db/prisma/schema.prisma && npm run build --workspace=@addere/api
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Preencher manualmente no painel Render (nunca commitar segredos)
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_DIRECT
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: PROTHEUS_ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://addere-staging.vercel.app
