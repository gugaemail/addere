services:
  # ── PRODUCTION ──────────────────────────────────────────────────────────────
  - type: web
    name: addere-api
    runtime: node
    region: oregon
    plan: starter
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Preencher manualmente no painel Render (nunca commitar segredos)
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_DIRECT
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: PROTHEUS_ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://addere.vercel.app

  # ── STAGING ─────────────────────────────────────────────────────────────────
  - type: web
    name: addere-api-staging
    runtime: node
    region: oregon
    plan: starter
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Preencher manualmente no painel Render (nunca commitar segredos)
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_DIRECT
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: PROTHEUS_ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://addere-staging.vercel.app
