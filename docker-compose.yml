services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: addere_dev_user
      POSTGRES_PASSWORD: addere_dev_password
      POSTGRES_DB: addere_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U addere_dev_user -d addere_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
